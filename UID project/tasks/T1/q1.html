<!DOCTYPE html>
<html>
<head>
    <title>Red Div Example</title>
    <style>
        .red {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h2>div tag:</h2>
    <div class="red">
        <p>The "div" tag defines a division or a section in an HTML document.<br>

            The "div" tag is easily styled by using the class or id attribute.<br>
            
            Any sort of content can be put inside the "div" tag! <p>
            
        </div>
</body>
</html>
