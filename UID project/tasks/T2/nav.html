<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Horizontal Navigation Bar </title>
    <style>
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            width: fit-content;
            height: auto;
            background-color: aqua;
            border: 0.1cm double fuchsia;
        }

        li {
            float: left;
        }

        li a {
            display: block;
            padding: 3px;
            background-color: ;
            text-align: center;
            border: 0.1cm solid cadetblue;
            text-decoration: none;
            width: 1.7cm;
            height: 0.8cm;
            border-radius: 4px;
        }
        li a:visited{
            color: darkgreen;
            background-color: aliceblue;
        }
        li a:hover{
            color: #333;
            background-color: hotpink;

        }
        li a:active{
            color: #2e1;
            background-color:grey;
            

        }
    </style>
</head>

            <li><a href="w2.html">2</a></li>

            <li><a href="w4.html">4</a></li>
            <li><a href="w5.html">5</a></li>
        </ul>
    </div>

</body>

</html>
