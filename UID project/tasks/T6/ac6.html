<!DOCTYPE html>
<html>

<head>
    <title>6th Question</title>
    <style>
        div {
            background-color:#333;
            height: 0.9cm;
        }

        .layout {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            float: left;
            padding:0.2cm 0.7cm;
        }

        li a {
            text-decoration: none;
            display: block;
            color: aquamarine;

        }

        li a:hover {
            background-color: crimson;
            color: yellow;
        }
        img{
            width: 0.7cm;
            float: left;
            padding: 0.1cm 0.7cm;
        }

        #right {
            float: right;
            background-color: #d67171;
            color: aliceblue;
            width: 5cm;
            height: 2.5cm;
            padding: 3mm;
            border: 4px solid mediumseagreen;
        }

        #left {
            float: left;
            background-color: #3f0de2;
            color: aliceblue;
            width: 5cm;
            height: 2.5cm;
            padding: 3mm;
            border: 4px solid rgb(112, 143, 131);
        }
    </style>
</head>

<body>
    <div>
        <ul class="layout">
            <img src="elephant.png">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Gallery</a></li>
        </ul>
    </div>
    <div id="right">
        <p>Html<br>css<br>java script</p>
    </div>
    <div id="left">
        <p>UID<br>JAVA<br>DSA</p>
    </div>
</body>

</html>
