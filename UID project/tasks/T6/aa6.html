<!DOCTYPE html>
<html>

<head>
    <style>
        div{
            background-color: #333;
            height: 0.7cm;
        }

        .layout {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            float: left;
            padding: 0.1cm 0.7cm;
        }
        
        li a {
            text-decoration: none;
            display: block;
            color: aquamarine;

        }
        li a:hover{
            background-color: crimson;
            color: yellow;

        }
    </style>
</head>

<body>
    <div>
        <ul class="layout">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Gallery</a></li>
        </ul>
    </div>
</body>

</html>
