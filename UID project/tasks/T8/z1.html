<!DOCTYPE html>
<html>
<head>
    <style>
        #progress-bar {
            width: 100%;
            height: 5px;
            background-color: #ddd;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #progress-bar:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background-color: #4CAF50;
            animation: progress-bar 5s ease-out forwards;
        }

        @keyframes progress-bar {
            to {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>
</body>
</html>
