<!DOCTYPE html>
<html>

<head>
    <style>
        .image-container {
            width: 300px;
            height: 400px;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: rotate 5s linear infinite;
            margin-top: 300px;
            margin-left: 500px;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="image-container">
        <img src="C:\Users\sasank\Desktop\uid\spider.jpeg" alt="Rotating Image">
    </div>

</body>

</html>
